version: "3.8"

services:
  # Configuration Service — Runs at startup/restart to write global DB/Redis configuration
  # to common_site_config.json so all containers are aligned.
  configurator:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    deploy:
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - |
        ls -1 apps > sites/apps.txt
        bench set-config -g db_host $$DB_HOST
        bench set-config -gp db_port $$DB_PORT
        bench set-config -g redis_cache "redis://$$REDIS_CACHE"
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE"
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE"
        bench set-config -gp socketio_port $$SOCKETIO_PORT
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  # Site Creator Service — One-shot job to run on first deploy to provision MariaDB database,
  # create the site, install ERPNext & HRMS, and set up TREEO logo/favicon/branding.
  create-site:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    deploy:
      restart_policy:
        condition: none
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint: ["bash", "-c"]
    command:
      - |
        wait-for-it -t 120 db:3306
        wait-for-it -t 120 redis-cache:6379
        wait-for-it -t 120 redis-queue:6379

        # Confirm configurator completed writing configuration
        export start=`date +%s`
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]]; do
          echo "Waiting for sites/common_site_config.json keys to be written by configurator..."
          sleep 5
          if (( `date +%s` - start > 120 )); then
            echo "Timeout waiting for sites/common_site_config.json write"
            exit 1
          fi
        done

        echo "common_site_config.json ready. Checking if site ${SITE_NAME} exists..."
        if [ ! -d "sites/${SITE_NAME}" ]; then
          echo "Creating site ${SITE_NAME}..."
          bench new-site ${SITE_NAME} \
            --no-mariadb-socket \
            --admin-password "${ADMIN_PASSWORD}" \
            --db-root-username root \
            --db-root-password "${DB_ROOT_PASSWORD}" \
            --mariadb-user-host-login-scope '%' \
            --install-app erpnext \
            --set-default

          echo "Installing hrms app on ${SITE_NAME}..."
          bench --site ${SITE_NAME} install-app hrms

          echo "Applying TREEO custom branding and taglines..."
          bench --site ${SITE_NAME} set-config app_title "TREEO HR system"
          bench --site ${SITE_NAME} set-config app_description "TREEO HR system - Empowering People, Restoring Nature"
          bench --site ${SITE_NAME} enable-scheduler

          # Update DB configurations for navbar settings, logo, favicon, and tagline
          bench --site ${SITE_NAME} execute "frappe.db.set_single_value('Navbar Settings', 'app_logo', 'https://fsn1.your-objectstorage.com/treeo-idn/original_images/logo_Ondjf8Q.png')"
          bench --site ${SITE_NAME} execute "frappe.db.set_single_value('Website Settings', 'app_logo', 'https://fsn1.your-objectstorage.com/treeo-idn/original_images/logo_Ondjf8Q.png')"
          bench --site ${SITE_NAME} execute "frappe.db.set_single_value('Website Settings', 'favicon', 'https://fsn1.your-objectstorage.com/treeo-idn/original_images/logo_Ondjf8Q.png')"
          bench --site ${SITE_NAME} execute "frappe.db.set_single_value('Website Settings', 'brand_html', '<span class=\"brand-label\">TREEO HR system</span>')"
          bench --site ${SITE_NAME} execute "frappe.db.set_single_value('Website Settings', 'tagline', 'TREEO HR system')"
          bench --site ${SITE_NAME} execute "frappe.db.commit()"
          
          echo "TREEO HR site ${SITE_NAME} initialized successfully!"
        else
          echo "Site ${SITE_NAME} already exists, running migrations..."
          bench --site ${SITE_NAME} migrate
        fi
    environment:
      SITE_NAME: "${SITE_NAME:-hr.treeo.id}"
      DB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy

  # Database Service — Production-tuned MariaDB
  db:
    image: "${MARIADB_IMAGE:-mariadb:10.6}"
    restart: unless-stopped
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--skip-character-set-client-handshake"
      - "--skip-innodb-read-only-compressed"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Redis services for cache and queues
  redis-cache:
    image: "${REDIS_IMAGE:-redis:6.2-alpine}"
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-queue:
    image: "${REDIS_IMAGE:-redis:6.2-alpine}"
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Python backend (Gunicorn) service
  backend:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    environment:
      FRAPPE_SITE_NAME_HEADER: "${SITE_NAME:-hr.treeo.id}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configure:
        condition: service_completed_successfully

  # Real-time websocket notifications
  websocket:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configure:
        condition: service_completed_successfully

  # Frontend Nginx reverse proxy serving static assets
  frontend:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 300
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    # Coolify uses Traefik. These labels connect Nginx port 8080 to the SSL Traefik routing.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frappe-hr-router.rule=Host(`${SITE_NAME:-hr.treeo.id}`)"
      - "traefik.http.routers.frappe-hr-router.entryPoints=https"
      - "traefik.http.routers.frappe-hr-router.tls=true"
      - "traefik.http.routers.frappe-hr-router.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"

  # Scheduler for background crons and timed events
  scheduler:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configure:
        condition: service_completed_successfully

  # Queue Workers to execute background jobs
  worker-default:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - bench
      - worker
      - --queue
      - default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configure:
        condition: service_completed_successfully

  worker-short:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - bench
      - worker
      - --queue
      - short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configure:
        condition: service_completed_successfully

  worker-long:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - bench
      - worker
      - --queue
      - long
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configure:
        condition: service_completed_successfully

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  sites:
  logs:
