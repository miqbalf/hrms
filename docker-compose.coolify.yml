version: "3.8"

services:
  # Database Service — Production MariaDB
  db:
    image: "${MARIADB_IMAGE:-mariadb:10.6}"
    restart: unless-stopped
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--skip-character-set-client-handshake"
      - "--skip-innodb-read-only-compressed"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Combined Redis Cache & Queue Service
  redis:
    image: "${REDIS_IMAGE:-redis:6.2-alpine}"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Python backend (Gunicorn) service + Configurator & Site Setup
  backend:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Phase 1: Bench configuration ==="
        if [ ! -d "apps/hrms" ]; then
          echo "Fetching hrms app..."
          bench get-app hrms --branch version-15
          echo "Building hrms assets..."
          bench build --app hrms --production || true
          # bench build creates a symlink sites/assets/hrms → apps/hrms/hrms/public
          # The frontend nginx container shares only the sites volume, not apps/,
          # so the symlink is broken there. Copy real files instead.
          if [ -L "sites/assets/hrms" ]; then
            cp -rL sites/assets/hrms /tmp/hrms-assets-tmp
            rm sites/assets/hrms
            mv /tmp/hrms-assets-tmp sites/assets/hrms
          elif [ ! -d "sites/assets/hrms" ]; then
            mkdir -p sites/assets/hrms
            cp -r apps/hrms/hrms/public/. sites/assets/hrms/ 2>/dev/null || true
          fi
        fi
        ls -1 apps > sites/apps.txt
        bench set-config -g db_host $$DB_HOST
        bench set-config -gp db_port $$DB_PORT
        bench set-config -g redis_cache "redis://$$REDIS_CACHE"
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE"
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE"
        bench set-config -gp socketio_port $$SOCKETIO_PORT

        apply_smtp_config() {
          if [ -z "$$SMTP_HOST" ]; then
            echo "SMTP_HOST not set — skipping email configuration."
            return 0
          fi
          echo "Applying SMTP configuration for $$SITE_NAME..."
          bench --site $$SITE_NAME set-config mail_server       "$$SMTP_HOST"
          bench --site $$SITE_NAME set-config mail_login        "$$SMTP_LOGIN"
          bench --site $$SITE_NAME set-config mail_password     "$$SMTP_PASSWORD"
          bench --site $$SITE_NAME set-config -p mail_port      $$SMTP_PORT
          bench --site $$SITE_NAME set-config -p use_tls        $$SMTP_USE_TLS
          bench --site $$SITE_NAME set-config -p use_ssl        $$SMTP_USE_SSL
          bench --site $$SITE_NAME set-config auto_email_id     "$$SMTP_FROM_EMAIL"
          bench --site $$SITE_NAME set-config email_sender_name "$$SMTP_FROM_NAME"
          echo "SMTP configuration applied."
        }

        echo "=== Phase 2: Service availability checks ==="
        wait-for-it -t 120 db:3306
        wait-for-it -t 120 redis:6379

        echo "=== Phase 3: Site creation or migration ==="
        if [ ! -d "sites/$$SITE_NAME" ]; then
          echo "Creating new site $$SITE_NAME..."
          bench new-site $$SITE_NAME \
            --no-mariadb-socket \
            --admin-password "$$ADMIN_PASSWORD" \
            --db-root-username root \
            --db-root-password "$$DB_ROOT_PASSWORD" \
            --mariadb-user-host-login-scope '%' \
            --install-app erpnext \
            --set-default

          echo "Installing hrms app on $$SITE_NAME..."
          bench --site $$SITE_NAME install-app hrms

          apply_smtp_config

          echo "Applying TREEO branding & taglines..."
          bench --site $$SITE_NAME set-config app_title "TREEO HR system"
          bench --site $$SITE_NAME set-config app_description "TREEO HR system - Empowering People, Restoring Nature"
          bench --site $$SITE_NAME enable-scheduler

          bench --site $$SITE_NAME execute "frappe.db.set_single_value('Website Settings', 'brand_html', '<span class=\"brand-label\">TREEO HR system</span>')"
          bench --site $$SITE_NAME execute "frappe.db.set_single_value('Website Settings', 'tagline', 'TREEO HR system')"

          if [ -f "sites/$$SITE_NAME/public/files/treeo_logo.png" ]; then
            bench --site $$SITE_NAME execute "frappe.db.set_single_value('Navbar Settings', 'app_logo', '/files/treeo_logo.png')"
            bench --site $$SITE_NAME execute "frappe.db.set_single_value('Website Settings', 'app_logo', '/files/treeo_logo.png')"
            bench --site $$SITE_NAME execute "frappe.db.set_single_value('Website Settings', 'favicon', '/files/treeo_logo.png')"
            echo "Logo configured."
          else
            echo "WARNING: treeo_logo.png not found. Upload it via Settings > Website Settings after first login."
          fi

          bench --site $$SITE_NAME execute "frappe.db.commit()"
          echo "Site $$SITE_NAME initialized successfully!"
        else
          echo "Site $$SITE_NAME already exists. Running migration..."
          bench --site $$SITE_NAME migrate
          apply_smtp_config
        fi

        echo "=== Phase 4: Start Gunicorn backend ==="
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          --threads=4 \
          --workers=1 \
          --worker-class=gthread \
          --worker-tmp-dir=/dev/shm \
          --timeout=120 \
          --preload \
          frappe.app:application
    environment:
      FRAPPE_SITE_NAME_HEADER: "${SITE_NAME:-hr.treeo.id}"
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis:6379
      REDIS_QUEUE: redis:6379
      SOCKETIO_PORT: "9000"
      SITE_NAME: "${SITE_NAME:-hr.treeo.id}"
      DB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      # SMTP (all optional — skipped when SMTP_HOST is empty)
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_LOGIN: "${SMTP_LOGIN:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_USE_TLS: "${SMTP_USE_TLS:-1}"
      SMTP_USE_SSL: "${SMTP_USE_SSL:-0}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-TREEO HR System}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Real-time websocket notifications
  websocket:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for site config..."
        until [ -f sites/common_site_config.json ]; do sleep 2; done
        echo "Site config ready! Starting websocket server..."
        exec node /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      backend:
        condition: service_started

  # Frontend Nginx proxy serving static assets
  frontend:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 300
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frappe-hr-router.rule=Host(`${SITE_NAME:-hr.treeo.id}`)"
      - "traefik.http.routers.frappe-hr-router.entryPoints=https"
      - "traefik.http.routers.frappe-hr-router.tls=true"
      - "traefik.http.routers.frappe-hr-router.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"

  # Scheduler for background crons
  scheduler:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for site config..."
        until [ -f "sites/$$SITE_NAME/site_config.json" ]; do sleep 5; done
        echo "Site ready! Starting scheduler..."
        exec bench schedule
    environment:
      SITE_NAME: "${SITE_NAME:-hr.treeo.id}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      backend:
        condition: service_started

  # Single Combined Queue Worker (Default, Short, Long)
  worker:
    image: "${FRAPPE_IMAGE:-frappe/erpnext}:${FRAPPE_VERSION:-v15}"
    restart: unless-stopped
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for site config..."
        until [ -f "sites/$$SITE_NAME/site_config.json" ]; do sleep 5; done
        echo "Site ready! Starting worker..."
        exec bench worker --queue short,default,long
    environment:
      SITE_NAME: "${SITE_NAME:-hr.treeo.id}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      backend:
        condition: service_started

volumes:
  db-data:
  redis-data:
  sites:
  logs:
